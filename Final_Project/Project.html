<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
        <a-scene background="color: #FAFAFA">
            <a-assets>

                    <img id="wall_diff" src="../assets/textures/beige_wall_001/beige_wall_001_diff_1k.png" alt="">
                    <img id="wall_ao" src="../assets/textures/beige_wall_001/beige_wall_001_ao_1k.png" alt="">
                    <img id="wall_nor" src="../assets/textures/beige_wall_001/beige_wall_001_nor_gl_1k.png" alt="">
                    <img id="wall_rough" src="../assets/textures/beige_wall_001/beige_wall_001_rough_1k.png" alt="">

                    <img id="cotton_diff" src="../assets/textures/cotton/cotton_jersey_diff_1k.png" alt="">
                    <img id="cotton_ao" src="../assets/textures/beige_wall_001/cotton_jersey_ao_1k.png" alt="">
                    <img id="cotton_nor" src="../assets/textures/beige_wall_001/cotton_jersey_nor_gl_1k.png" alt="">
                    <img id="cotton_rough" src="../assets/textures/beige_wall_001/cotton_jersey_rough_1k.png" alt="">

                    <img id="paintedbrick_diff" src="../assets/textures/painted_brick/painted_brick_diff_1k.png" alt="">
                    <img id="paintedbrick_ao" src="../assets/textures/painted_brick/painted_brick_ao_1k.png" alt="">
                    <img id="paintedbrick_nor" src="../assets/textures/painted_brick/painted_brick_nor_gl_1k.png" alt="">
                    <img id="paintedbrick_rough" src="../assets/textures/painted_brick/painted_brick_rough_1k.png" alt="">

                    <img id="curly_diff" src="../assets/textures/curly_teddy/curly_teddy_natural_diff_1k.png" alt="">
                    <img id="curly_ao" src="../assets/textures/curly_teddy/curly_teddy_natural_ao_1k.png" alt="">
                    <img id="curly_nor" src="../assets/textures/curly_teddy/curly_teddy_natural_nor_gl_1k.png" alt="">
                    <img id="curly_rough" src="../assets/textures/curly_teddy/curly_teddy_natural_rough_1k.png" alt="">

                    <img id="oakwood_diff" src="../assets/textures/oakwood/oak_veneer_01_diff_1k.png" alt="">
                    <img id="oakwood_ao" src="../assets/textures/oakwood/oak_veneer_01_ao_1k.png" alt="">
                    <img id="oakwood_nor" src="../assets/textures/oakwood/oak_veneer_01_nor_gl_1k.png" alt="">
                    <img id="oakwood_rough" src="../assets/textures/oakwood/oak_veneer_01_rough_1k.png" alt="">

                    <img id="floortiles_diff" src="../assets/textures/floortiles/interior_tiles_natural_diff_1k.png" alt="">
                    <img id="floortiles_ao" src="../assets/textures/floortiles/interior_tiles_natural_ao_1k.png" alt="">
                    <img id="floortiles_nor" src="../assets/textures/floortiles/interior_tiles_natural_nor_gl_1k.png" alt="">
                    <img id="floortiles_rough" src="../assets/textures/floortiles/interior_tiles_natural_rough_1k.png" alt="">




                </a-assets>



            
                <a-entity material= "roughness: 1; metalness: 0; src: #floortiles_diff; roughnessMap: #floortiles_rough;  normalMap: #floortiles_nor; ambientOcclusionMap: #floortiles_ao"> <!--Room Placement-->
                <!-- Room Floor-->
                <a-box
                    rotation="-90 0 0"
                    position=".7 0 -0.25"
                    width="10"
                    height="10"
                    color="#6a6853"
                    rotation="0 0 0">
                </a-box>


                <!-- Ceiling-->
                <a-box material="roughness: 1; metalness: 0; src: #wall_diff; roughnessMap: #wall_rough;  normalMap: #wall_nor; ambientOcclusionMap: #wall_ao"
                    rotation="-90 0 0"
                    position=".7 4.002 -0.25"
                    width="10"
                    height="10"
                    depth=".01"
                    color="#ffecd4"
                    rotation="0 0 0">
                </a-box>
                <!--Light-->
                <a-entity position="-0.628 3.944 0.567">
                <a-box
                        depth=".25"
                        height=".09"
                        width="1.390"
                        material="emissive: #ffffee; emissiveIntensity: 1;">
                    </a-box>
                    <a-light type="point" intensity="8"  color="#FFF">
                    </a-light>
                <a-light type="directional" intensity="8"  color="#FFF">
                </a-light>
                </a-entity>

                <a-entity> <!-- Wall N-->
                    <a-box 
                    material= "roughness: 1; metalness: 0; src: #wall_diff; roughnessMap: #wall_rough;  normalMap: #wall_nor; ambientOcclusionMap: #wall_ao"
                    width="3.22"
                    height="4"
                    depth="0.3"
                    color="#f7f3ca"
                    rotation="0 0 0"
                    position="-0.632 1.989 1.972">
                    </a-box> 
                         
                
                <a-entity> <!-- Wall E-->
                <a-box material="roughness: 1; metalness: 0; src: #paintedbrick_diff; roughnessMap: #paintedbrick_rough;  normalMap: #paintedbrick_nor; ambientOcclusionMap: #paintedbrick_ao; color:#ffb157"
                width="3.605" 
                height="4" 
                depth="0.3" 
                rotation="0 90 0"
                color="#f7f3ca"
                position="1.086 2.016 0.386">
                </a-box>

                <!--Rectaungler Platform-->
                        <a-box
                        position="0.672 .236 -0.026"
                        depth=".44"
                        height=".485"
                        width=".44"
                        color="#000000">
                        </a-box>

                <a-entity> <!-- Wall S-->
                    <a-box 
                    material="roughness: 1; metalness: 0; src: #wall_diff; roughnessMap: #wall_rough;  normalMap: #wall_nor; ambientOcclusionMap: #wall_ao"
                    width="2.47"
                    height="4"
                    depth="0.3"
                    color="#f7f3ca"
                    rotation="0 0 0"
                    position="-0.169 2.021 -1.56">
                    </a-box> 
                </a-entity>

                    <!--Circle Platform-->
                    <a-cylinder
                    position="-1.218 0.108 -1.005"
                    radius="0.1"
                    height="0.2"
                    color="#707070">
            `     </a-cylinder>
                    

                <a-entity><!-- Wall W-->
                <a-box 
                material="roughness: 1; metalness: 0; src: #wall_diff; roughnessMap: #wall_rough;  normalMap: #wall_nor; ambientOcclusionMap: #wall_ao"
                width="2.75"
                height="4"
                depth="0.3"
                color="#f7f3ca"
                rotation="0 -90 0"
                position="-2.3 2 0.522">
                </a-box> 
            

                <!-- Door -->
                <a-box  
                material= "roughness: 1; metalness: 0; src: #oakwood_diff; roughnessMap: #oakwood_rough;  normalMap: #oakwood_nor; ambientOcclusionMap: #oakwood_ao"
                width=".955"
                height="2.21"
                depth=".04" 
                color="#E59C5A"
                rotation="0 45 0"
                position="-1.792 1.081 -1.080">
                </a-box> 
                </a-entity>



            
                </a-entity>
        </a-scene>
      <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</body>
</html>
