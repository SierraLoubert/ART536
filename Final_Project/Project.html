        <a-scene background="color: #FAFAFA">

            <!-- Asset Rules-->
            <a-assets>

            <a-mixin id="floor" geometry="primitive: box; width: 3498; height: 487; depth:0.1"></a-mixin>
            
            <a-mixin id="side wall" geometry="primitive: box; width: 3498; height: 346; depth:0.3"></a-mixin>

            <a-mixin id="small wall" geometry="primitive: box; width: 496; height: 346; depth:0.3"></a-mixin>

            <a-mixin id="main wall" geometry="primitive: box; width: 397.261; height: 200; depth:0.3"></a-mixin>

            <a-mixin id="doorway wall" geometry="primitive: box; width: 102.575; height: 44.936; depth:0.3"></a-mixin>

            <a-mixin id="circle wall" geometry="primitive: cylinder; height: 700; radius: 80"></a-mixin>

            <a-mixin id="door" geometry="primitive: box; width: 200; height: 326; depth:0.3; rotation: 0 90 0"></a-mixin>

            <a-mixin id="Square Light" geometry="primitive: box; width: 2; height: 5; depth:0.3" material="emissive: #ffffee; emissiveIntensity: 1;"></a-mixin>

            <a-mixin id="Circle Light" geometry="primitive: cylinder; height: 5; radius: 0.3"></a-mixin>

            <a-mixin id="column" geometry="primitive: cylinder; height: 5; radius: 0.5"></a-mixin>

            <a-mixin id="primary" material="color: #103351"></a-mixin>

            <a-mixin id="secondary" material="color: #c89332"></a-mixin>

            <a-mixin id="white" material="color: #ffffff"></a-mixin>

            <a-mixin id="brown" material="color: #b47f56"></a-mixin>
