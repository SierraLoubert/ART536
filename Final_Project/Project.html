<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
        <a-scene background="color: #FAFAFA">

            <!-- Asset Rules-->
            <a-assets>

            <a-mixin id="floor" geometry="primitive: box; width: 3498; height: 487; depth:0.1"></a-mixin>
            
            <a-mixin id="sidewall" geometry="primitive: box; width: 3498; height: 346; depth:0.3"></a-mixin>

            <a-mixin id="smallwall" geometry="primitive: box; width: 496; height: 346; depth:0.3"></a-mixin>

            <a-mixin id="mainwall" geometry="primitive: box; width: 397.261; height: 346; depth:0.3"></a-mixin>

            <a-mixin id="doorwaywall" geometry="primitive: box; width: 102.575; height: 160; depth:0.3"></a-mixin>

            <a-mixin id="circlewall" geometry="primitive: cylinder; height: 346; radius: 80"></a-mixin>

            <a-mixin id="door" geometry="primitive: box; width: 200; height: 326; depth:0.3; rotation: 0 90 0"></a-mixin>

            <a-mixin id="squarelight" geometry="primitive: box; width: 2; height: 5; depth:0.3" material="emissive: #ffffee; emissiveIntensity: 1;"></a-mixin>

            <a-mixin id="circlelight" geometry="primitive: cylinder; height: 5; radius: 0.3"></a-mixin>

            <a-mixin id="column" geometry="primitive: cylinder; height: 5; radius: 0.5"></a-mixin>

            <a-mixin id="platform" geometry="primitive: box; width: 200; height: 200; depth:100"></a-mixin>

            <a-mixin id="fivebox" geometry="primitive: box; width: 200; height: 200; depth:100"></a-mixin>

            <a-mixin id="map" geometry="primitive: box; width: 100; height: 50; depth:0.3"></a-mixin>

            <a-mixin id="primary" material="color: #103351"></a-mixin>

            <a-mixin id="secondary" material="color: #c89332"></a-mixin>

            <a-mixin id="white" material="color: #ffffff"></a-mixin>

            <a-mixin id="brown" material="color: #b47f56"></a-mixin>
            
            </a-assets>
            
                <a-entity id="Rooms">
                    <!-- Room Floor-->
                    <a-box mixin="floor primary"
                        position="1678 -50 -0.25"
                        rotation= "90 0 0">
                    </a-box>

                    <!-- Ceiling-->
                    <a-box mixin="floor primary"
                        position="1678 292 -0.25"
                        rotation="90 0 0">
                    </a-box>

                    <!-- Wall N-->
                    <a-box 
                    mixin="smallwall primary"
                    position="3426 123 4.542"
                    rotation= "0 90 0">
                    </a-box> 
                
                    <!-- Wall E-->
                    <a-box 
                    mixin="sidewall primary"
                    position="1680.20 121.433 245.32">
                    </a-box>

                    <!-- Wall W-->
                    <a-box 
                    mixin="sidewall primary"
                    position="1680.20 121.433 -244.32">
                    </a-box> 

                    <!-- Wall S-->
                    <a-box 
                    mixin="smallwall primary"
                    position="-68 120 3"
                    rotation= "0 90 0">
                    </a-box> 

                    <!-- Wall #1-->
                    <a-box 
                    mixin="mainwall primary"
                    position="1098 125.214 49.542"
                    rotation= "0 90 0">
                    </a-box> 
                    <a-box 
                    mixin="doorwaywall primary"
                    position="1098 211 -199.685"
                    rotation= "0 90 0">
                    </a-box>

                    <!-- Wall #2-->
                    <a-box 
                    mixin="mainwall primary"
                    position="2196 125.214 49.542"
                    rotation= "0 90 0">
                    </a-box> 
                    <a-box 
                    mixin="doorwaywall primary"
                    position="2196 211 -199.685"
                    rotation= "0 90 0">
                    </a-box> 
                </a-entity>

                    <box
                    mixin="map secondary"
                    position="800 125.214 49.542"
                    rotation= "0 90 0">
                    </a-box> 

                <!--Light-->
                <a-entity id="Lights">

<box

                    </a-box><box

                    position="1098 200.214 49.542"

<!--Rectaungler Platform (2nd Room #1)-->
