<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

<body>
        <a-scene background="color: #FAFAFA">

            <!-- Asset Rules-->
            <a-assets>

                <a-mixin id="floor" geometry="primitive: box; width: 83.952; height: 11.688; depth:0.1"></a-mixin>
            
                <a-mixin id="sidewall" geometry="primitive: box; width: 83.952; height: 11.688; depth:0.3"></a-mixin>

                <a-mixin id="smallwall" geometry="primitive: box; width: 12; height: 11; depth:0.3"></a-mixin>

                <a-mixin id="mainwall" geometry="primitive: box; width: 9.5; height: 10.688; depth:0.3"></a-mixin>

                <a-mixin id="doorwaywall" geometry="primitive: box; width: 11; height: 3.84; depth:0.3"></a-mixin>

                <a-mixin id="circlewall" geometry="primitive: cylinder; height: 8; radius: 3"></a-mixin>

                <a-mixin id="door" geometry="primitive: box; width: 4.8; height: 7.824; depth:1.8;"></a-mixin>

                

                <a-mixin id="squarelightsquare" geometry="primitive: box; width: 2.3; height: 2.3; depth:0.1"></a-mixin>

                <a-mixin id="circlelight" geometry="primitive: cylinder; height: 120; radius: 0" material="emissive: #ffffff; emissiveIntensity: 1; type=directional;"></a-mixin>

                <a-mixin id="column" geometry="primitive: cylinder; height: 60; radius: 6"></a-mixin>

                <a-mixin id="platform" geometry="primitive: box; width: 1; height: 2; depth:1"></a-mixin>

                <a-mixin id="fivebox" geometry="primitive: box; width: 4.800; height: 4.800; depth:2.400"></a-mixin>

                <a-mixin id="map" geometry="primitive: box; width: 2.400; height: .001; depth:0.6"></a-mixin>

                <a-mixin id="primary" material="color: #103351"></a-mixin>

                <a-mixin id="secondary" material="color: #c89332"></a-mixin>

                <a-mixin id="white" material="color: #ffffff"></a-mixin>

                <a-mixin id="brown" material="color: #b47f56"></a-mixin>
            
            </a-assets>

                <a-entity id="player" position="0 1.6 0">
                    <!-- camera -->
                    <a-entity id="camera" camera wasd-controls look-controls></a-entity>
                    <!-- hand controls -->
                    <a-entity id="left-hand" raycaster="objects: .floor" oculus-touch-controls="hand: left" blink-controls></a-entity>
                    <a-entity id="right-hand" raycaster="objects: .floor" oculus-touch-controls="hand: right" blink-controls></a-entity>
                </a-entity>
