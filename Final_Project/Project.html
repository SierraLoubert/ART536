        <script>
            (function () {
                var video = document.getElementById('spidervideo2');
                if (!video) return;

                var tryPlay = function () {
                    var playPromise = video.play();
                    if (playPromise && typeof playPromise.catch === 'function') {
                        playPromise.catch(function () {
                            // Browser may still require an explicit user gesture.
                        });
                    }
                };

                document.addEventListener('click', tryPlay, { once: true });
                document.addEventListener('touchstart', tryPlay, { once: true });
                window.addEventListener('load', tryPlay);
                
            })();

            const startButton = document.querySelector('#startButtonVR');
            const startButtonText = document.querySelector('#startButtonText');
            const soundEntity = document.querySelector('#soundVR');
            const rawAudio = document.getElementById('spidervideoaudio');
            const camera = document.querySelector('#camera');

            function unlockAudioContext() {
                const audioCtx = AFRAME.THREE.AudioContext.getContext();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(function () {
                        // Some browsers can still block until a trusted gesture.
                    });
                }
            }

            function playStartAreaSound() {
                unlockAudioContext();

                if (soundEntity && soundEntity.components && soundEntity.components.sound) {
                    soundEntity.components.sound.stopSound();
                    soundEntity.components.sound.playSound();
                    return;
                }

                if (rawAudio) {
                    rawAudio.currentTime = 0;
                    rawAudio.play().catch(function () {
                        // Final fallback can still fail until browser receives a trusted gesture.
                    });
                }
            }

            [startButton, startButtonText].forEach(function (el) {
                if (!el) return;
                el.addEventListener('click', playStartAreaSound);
            });

            ['click', 'touchstart', 'keydown'].forEach(function (eventName) {
                document.addEventListener(eventName, unlockAudioContext, { once: true });
            });

            // Fallback proximity trigger for when the player gets near the start area.
            var proximityPlayed = false;
            function checkStartAreaProximity() {
                if (!camera || !soundEntity) return;

                var cameraPos = new THREE.Vector3();
                var soundPos = new THREE.Vector3();
                camera.object3D.getWorldPosition(cameraPos);
                soundEntity.object3D.getWorldPosition(soundPos);

                var distance = cameraPos.distanceTo(soundPos);
                if (distance <= 3.5 && !proximityPlayed) {
                    playStartAreaSound();
                    proximityPlayed = true;
                } else if (distance > 4.5) {
                    proximityPlayed = false;
                }
            }

            setInterval(checkStartAreaProximity, 250);

                        </script>
