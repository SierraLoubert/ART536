<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Module</title>
</head>
<body>
    <a-scene physics="debug: true">

        <a-box position="1 5 -3"
					rotation="0 45 0"
					width="40"
					height="40"
					depth="0.1"
					color="#7BC8A4"
					dynamic-body="shape: none;"
				shape="shape: box; halfExtents: 1 1 1;"></a-box>
    
        <a-sphere position="0 5 -5"
            radius="1.25"
            color="#EF2D5E"
            dynamic-body="shape: sphere;  sphereRadius: 2; mass: 0.1;"></a-sphere>

        <a-cylinder position="1 5 -3"
            radius="0.5" height="1.5"
            color="#FFC65D"
            dynamic-body="shape: none; mass: 8;"
            shape__top="shape: sphere; offset: 0 0.75 0; radius: 0.7 ;"
	shape__bottom="shape: sphere; offset: 0 -0.75 0; radius: 0.7 ;"
	shape__center="shape: cylinder; offset: 0 0 0; height: 1; radiusTop: 0.7; radiusBottom: 0.7;"></a-cylinder>

        <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>

          <a-sphere position="-1.1 6 -5" radius="1.25" color="#fff" dynamic-body></a-sphere>

        <a-sphere position="2 6 -5" radius="1.25" color="#fff" dynamic-body></a-sphere>

        <a-box position="0.5 1 -5" static-body></a-box>

        <a-box position="0 0 -4" rotation="-90 0 0" width="40" height="40" depth="0.1" color="#7BC8A4" static-body="shape: box;"></a-box>


        <a-sky color="#222"></a-sky>
    </a-scene>  
</body>
</html>
