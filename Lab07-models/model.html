<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab07-models</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>

    <a-scene background="color: #FAFAFA">

         <a-assets>
        <a-asset-item id="3d-text" src="../assets/models/3d-text.gltf"></a-asset-item>
         <a-asset-item id="map-middle-dot" src="../assets/models/MapMiddle Dot.gltf"></a-asset-item>
          <a-asset-item id="spider" src="../assets/models/Spider.gltf"></a-asset-item>
        
        </a-assets>

        <!-- Using the asset management system. -->
        <a-gltf-model src="#3d-text" position="-2 8 -7" scale=".5 .5 .5"></a-gltf-model>
        <a-gltf-model src="#map-middle-dot" position="-0.625 .928 -2.615" scale=".02 .02 .02"></a-gltf-model>
         <a-gltf-model src="#spider" position="0 1 -3" scale="3 3 3"></a-gltf-model>



        <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9" shadow></a-box>
        <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E" shadow></a-sphere>
        <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D" shadow></a-cylinder>
        <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" shadow></a-plane>
    </a-scene>
    
    
</body>
</html>
